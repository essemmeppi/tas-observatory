name: Daily observatory

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  observatory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r observatory/requirements.txt

      - name: Run observatory
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python -m observatory.run

      - name: Commit new records
        run: |
          git config user.name "tas-observatory"
          git config user.email "actions@github.com"
          git add data/innovations.jsonl
          if git diff --cached --quiet; then
            echo "No new records today"
          else
            git commit -m "observatory: daily update $(date -u +%F)"
            git push
          fi
