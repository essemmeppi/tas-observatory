name: Test Slack webhook

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Custom message to post (defaults to the webhook test text)"
        required: false
        default: ""

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Post test message
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          MESSAGE: ${{ inputs.message }}
        run: |
          url="$SLACK_WEBHOOK_URL"
          case "$url" in http*) ;; *) url="https://$url";; esac
          text="${MESSAGE:-TAS Observatory webhook test — if you can read this, the digest will arrive.}"
          payload=$(jq -n --arg text "$text" '{text: $text}')
          code=$(curl -s -o /tmp/resp -w "%{http_code}" -X POST -H 'Content-type: application/json' \
            --data "$payload" "$url")
          echo "HTTP $code"; cat /tmp/resp; echo
          [ "$code" = "200" ]
